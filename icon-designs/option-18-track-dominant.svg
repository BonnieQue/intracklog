<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- DAY VERSION: organic city map background -->
  <rect width="1024" height="1024" rx="220" fill="#d8d7d0"/>

  <!-- ===== ORGANIC CITY MAP ===== -->

  <!-- Parks / green areas (organic shapes) -->
  <path d="M 60 180 Q 100 140 160 160 Q 220 180 220 240 Q 200 290 140 280 Q 80 260 60 220 Z" fill="#A8C9A0" opacity="0.55"/>
  <path d="M 720 100 Q 780 80 840 120 Q 880 160 860 220 Q 820 250 780 240 Q 720 220 700 170 Z" fill="#A8C9A0" opacity="0.55"/>
  <path d="M 90 760 Q 140 740 180 770 Q 200 820 170 860 Q 120 880 80 850 Q 60 810 80 780 Z" fill="#A8C9A0" opacity="0.55"/>

  <!-- Water / river feature (curved organic path) -->
  <path d="M 940 80 Q 880 200 900 320 Q 940 440 870 540 L 1024 540 L 1024 80 Z" fill="#9DC4DE" opacity="0.55"/>
  <path d="M 870 540 Q 840 620 880 720 L 1024 720 L 1024 540 Z" fill="#9DC4DE" opacity="0.55"/>

  <!-- WHITE STREETS — irregular, organic network -->
  <g stroke="#ffffff" stroke-linecap="round" fill="none">

    <!-- Wider main thoroughfares -->
    <g stroke-width="14">
      <path d="M 0 350 Q 240 360 460 340 Q 700 330 1024 360"/>
      <path d="M 0 580 Q 220 590 480 580 Q 720 580 1024 600"/>
      <path d="M 380 0 Q 390 200 400 380 Q 410 580 400 800 Q 395 950 410 1024"/>
    </g>

    <!-- Medium streets -->
    <g stroke-width="9">
      <path d="M 60 80 Q 80 200 140 320"/>
      <path d="M 200 0 Q 210 140 240 280"/>
      <path d="M 540 60 Q 530 220 580 360"/>
      <path d="M 700 0 Q 720 180 760 350"/>
      <path d="M 840 60 Q 870 200 880 360"/>
      <path d="M 60 440 Q 200 450 380 460"/>
      <path d="M 480 460 Q 660 470 880 480"/>
      <path d="M 60 700 Q 200 720 380 730"/>
      <path d="M 480 750 Q 680 760 920 740"/>
      <path d="M 100 880 Q 280 900 480 910 Q 720 920 940 900"/>
      <path d="M 660 580 Q 700 720 720 880"/>
      <path d="M 180 360 Q 220 500 240 660"/>
      <path d="M 880 380 Q 900 540 880 720"/>
    </g>

    <!-- Smaller residential streets -->
    <g stroke-width="5" opacity="0.85">
      <path d="M 60 150 Q 240 160 380 140"/>
      <path d="M 60 240 Q 240 250 380 240"/>
      <path d="M 100 280 Q 160 300 220 290"/>
      <path d="M 480 100 Q 600 110 700 90"/>
      <path d="M 480 200 Q 620 210 760 190"/>
      <path d="M 480 280 Q 620 290 780 280"/>
      <path d="M 80 400 Q 160 420 240 410"/>
      <path d="M 240 380 L 240 460"/>
      <path d="M 240 480 L 240 580"/>
      <path d="M 240 600 L 240 720"/>
      <path d="M 100 500 Q 160 510 220 500"/>
      <path d="M 100 540 Q 220 560 360 540"/>
      <path d="M 100 640 Q 220 660 360 640"/>
      <path d="M 480 420 Q 580 440 660 420"/>
      <path d="M 480 520 Q 600 540 700 520"/>
      <path d="M 480 660 Q 600 680 700 660"/>
      <path d="M 540 700 L 540 800"/>
      <path d="M 600 720 L 600 820"/>
      <path d="M 660 720 Q 680 800 660 880"/>
      <path d="M 100 780 Q 200 800 320 790"/>
      <path d="M 100 820 Q 200 840 320 830"/>
      <path d="M 780 460 L 780 580"/>
      <path d="M 820 460 L 820 600"/>
      <path d="M 760 740 Q 800 800 800 880"/>
      <path d="M 840 760 L 840 880"/>
      <path d="M 200 940 L 320 950"/>
      <path d="M 60 320 L 180 330"/>
      <path d="M 60 660 L 240 670"/>
      <path d="M 700 100 L 800 80"/>
      <path d="M 540 940 L 700 940"/>
    </g>

    <!-- Diagonal connectors for organic feel -->
    <g stroke-width="6" opacity="0.7">
      <path d="M 60 460 Q 140 540 240 580"/>
      <path d="M 240 720 Q 340 770 440 800"/>
      <path d="M 540 380 Q 640 480 720 540"/>
      <path d="M 100 100 Q 180 180 240 240"/>
      <path d="M 800 200 Q 880 280 920 360"/>
    </g>
  </g>

  <!-- ===== MAIN COMPOSITION (on top of map) ===== -->

  <!-- Track: bold green road, double-wide -->
  <!-- Soft outer halo -->
  <path d="M 80 900 Q 280 820 420 720 Q 580 600 720 540 Q 880 480 940 380"
        stroke="#2D9F6F" stroke-width="160" stroke-linecap="round" fill="none" opacity="0.18"/>

  <!-- Main road body -->
  <path d="M 80 900 Q 280 820 420 720 Q 580 600 720 540 Q 880 480 940 380"
        stroke="#2D9F6F" stroke-width="120" stroke-linecap="round" fill="none"/>

  <!-- Dashed centre line -->
  <path d="M 80 900 Q 280 820 420 720 Q 580 600 720 540 Q 880 480 940 380"
        stroke="#d8d7d0" stroke-width="10" stroke-linecap="round" fill="none"
        stroke-dasharray="50 38"/>

  <!-- Orange start marker -->
  <circle cx="80" cy="900" r="40" fill="#E07A3A"/>
  <circle cx="80" cy="900" r="16" fill="#d8d7d0"/>

  <!-- Pin — tip touches the track -->
  <g transform="translate(420 230)">
    <!-- Pin shape -->
    <path d="M 130 0
             C 56 0 0 56 0 130
             C 0 200 110 296 130 320
             C 150 296 260 200 260 130
             C 260 56 204 0 130 0 Z"
          fill="#E07A3A"/>

    <!-- Inner circle (dark) holds the car -->
    <circle cx="130" cy="124" r="86" fill="#1a1a22"/>

    <!-- MODERN sedan -->
    <g transform="translate(50 92)">
      <!-- Lower body -->
      <path d="M 6 44
               Q 6 26 28 24
               L 152 24
               Q 174 26 174 44
               L 174 52
               L 6 52 Z"
            fill="#d8d7d0"/>
      <!-- Cabin -->
      <path d="M 36 24
               Q 42 6 64 4
               L 116 4
               Q 138 6 144 24
               Z"
            fill="#85B7EB"/>
      <!-- Door split -->
      <line x1="89" y1="6" x2="91" y2="24" stroke="#1a1a22" stroke-width="1.2" opacity="0.5"/>
      <!-- Character line -->
      <line x1="20" y1="38" x2="160" y2="38" stroke="#1a1a22" stroke-width="0.8" opacity="0.25"/>
      <!-- Wheels -->
      <circle cx="42" cy="52" r="13" fill="#1a1a22"/>
      <circle cx="42" cy="52" r="6" fill="#d8d7d0"/>
      <circle cx="42" cy="52" r="2" fill="#1a1a22"/>
      <circle cx="138" cy="52" r="13" fill="#1a1a22"/>
      <circle cx="138" cy="52" r="6" fill="#d8d7d0"/>
      <circle cx="138" cy="52" r="2" fill="#1a1a22"/>
      <!-- Lights -->
      <rect x="166" y="32" width="8" height="5" rx="1.5" fill="#E07A3A"/>
      <rect x="6" y="32" width="8" height="5" rx="1.5" fill="#E07A3A" opacity="0.6"/>
    </g>
  </g>
</svg>
