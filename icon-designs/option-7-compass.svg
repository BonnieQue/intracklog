<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0c"/>
      <stop offset="1" stop-color="#1a1a22"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="220" fill="url(#bg7)"/>

  <!-- Outer compass ring -->
  <circle cx="512" cy="512" r="340" fill="none" stroke="#2D9F6F" stroke-width="26"/>

  <!-- Subtle inner ring -->
  <circle cx="512" cy="512" r="280" fill="none" stroke="#2D9F6F" stroke-width="4" opacity="0.3"/>

  <!-- Cardinal markers (N S E W) -->
  <circle cx="512" cy="172" r="14" fill="#E07A3A"/>
  <circle cx="852" cy="512" r="10" fill="#f0efe8" opacity="0.5"/>
  <circle cx="512" cy="852" r="10" fill="#f0efe8" opacity="0.5"/>
  <circle cx="172" cy="512" r="10" fill="#f0efe8" opacity="0.5"/>

  <!-- Compass needle (pointing NNE) -->
  <path d="M 512 512 L 660 280 L 530 520 Z" fill="#E07A3A"/>
  <path d="M 512 512 L 364 744 L 494 504 Z" fill="#f0efe8"/>

  <!-- Center pivot -->
  <circle cx="512" cy="512" r="36" fill="#0a0a0c" stroke="#2D9F6F" stroke-width="8"/>
  <circle cx="512" cy="512" r="14" fill="#E07A3A"/>

  <!-- Tick marks every 30° -->
  <g stroke="#2D9F6F" stroke-width="6" stroke-linecap="round" opacity="0.7">
    <line x1="512" y1="200" x2="512" y2="232"/>
    <line x1="824" y1="512" x2="792" y2="512"/>
    <line x1="512" y1="824" x2="512" y2="792"/>
    <line x1="200" y1="512" x2="232" y2="512"/>
  </g>
  <g stroke="#2D9F6F" stroke-width="3" stroke-linecap="round" opacity="0.4">
    <line x1="676" y1="240" x2="666" y2="270"/>
    <line x1="784" y1="348" x2="754" y2="358"/>
    <line x1="784" y1="676" x2="754" y2="666"/>
    <line x1="676" y1="784" x2="666" y2="754"/>
    <line x1="348" y1="784" x2="358" y2="754"/>
    <line x1="240" y1="676" x2="270" y2="666"/>
    <line x1="240" y1="348" x2="270" y2="358"/>
    <line x1="348" y1="240" x2="358" y2="270"/>
  </g>
</svg>
