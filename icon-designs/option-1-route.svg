<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background: dark gradient -->
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0c"/>
      <stop offset="1" stop-color="#131318"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="220" fill="url(#bg1)"/>

  <!-- Main route line - bold accent green curve -->
  <path d="M 180 800 Q 420 700 480 480 Q 540 260 820 200"
        stroke="#2D9F6F" stroke-width="60" stroke-linecap="round" fill="none"/>

  <!-- Soft echo line -->
  <path d="M 240 860 Q 480 760 540 540 Q 600 320 880 260"
        stroke="#2D9F6F" stroke-width="20" stroke-linecap="round" fill="none" opacity="0.25"/>

  <!-- Endpoint marker (circle with dot) -->
  <circle cx="820" cy="200" r="100" fill="#2D9F6F"/>
  <circle cx="820" cy="200" r="44" fill="#E07A3A"/>

  <!-- Tick marks along the path -->
  <line x1="280" y1="780" x2="320" y2="740" stroke="#2D9F6F" stroke-width="22" stroke-linecap="round" opacity="0.55"/>
  <line x1="430" y1="640" x2="470" y2="600" stroke="#2D9F6F" stroke-width="22" stroke-linecap="round" opacity="0.55"/>
  <line x1="570" y1="430" x2="610" y2="390" stroke="#2D9F6F" stroke-width="22" stroke-linecap="round" opacity="0.55"/>
</svg>
