<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0efe8"/>
      <stop offset="1" stop-color="#d8d7d0"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="220" fill="url(#bg10)"/>

  <!-- Subtle map grid lines -->
  <g stroke="#0a0a0c" stroke-width="2" opacity="0.08">
    <line x1="0" y1="240" x2="1024" y2="240"/>
    <line x1="0" y1="480" x2="1024" y2="480"/>
    <line x1="0" y1="720" x2="1024" y2="720"/>
    <line x1="240" y1="0" x2="240" y2="1024"/>
    <line x1="480" y1="0" x2="480" y2="1024"/>
    <line x1="720" y1="0" x2="720" y2="1024"/>
  </g>

  <!-- Curved route from start to end -->
  <path d="M 220 800
           Q 360 700 440 720
           Q 540 740 580 600
           Q 620 460 720 440
           Q 800 420 760 280"
        stroke="#2D9F6F" stroke-width="32" stroke-linecap="round" fill="none"
        stroke-dasharray="8 30"/>

  <!-- Start pin (green hollow) -->
  <circle cx="220" cy="800" r="44" fill="#0a0a0c"/>
  <circle cx="220" cy="800" r="22" fill="#f0efe8"/>

  <!-- End pin (orange filled, larger, with map pin shape) -->
  <path d="M 760 180
           C 700 180 656 222 656 280
           C 656 336 720 380 760 420
           C 800 380 864 336 864 280
           C 864 222 820 180 760 180 Z"
        fill="#E07A3A"/>
  <circle cx="760" cy="280" r="32" fill="#f0efe8"/>

  <!-- Distance badge -->
  <rect x="380" y="500" width="160" height="60" rx="30" fill="#0a0a0c"/>
  <text x="460" y="544" fill="#2D9F6F" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" text-anchor="middle" letter-spacing="2">42 km</text>
</svg>
