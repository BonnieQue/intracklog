      <stop offset="0" stop-color="#2D9F6F"/>
      <stop offset="1" stop-color="#0a0a0c"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="220" fill="url(#bg11)"/>

  <!-- Map pin shape -->
  <path d="M 512 160
           C 348 160 224 284 224 448
           C 224 624 480 880 512 920
           C 544 880 800 624 800 448
