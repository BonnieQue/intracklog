  <line x1="290" y1="380" x2="248" y2="354" stroke="#f0efe8" stroke-width="14" stroke-linecap="round" opacity="0.4"/>
  <line x1="512" y1="288" x2="512" y2="240" stroke="#f0efe8" stroke-width="14" stroke-linecap="round" opacity="0.4"/>
  <line x1="734" y1="380" x2="776" y2="354" stroke="#f0efe8" stroke-width="14" stroke-linecap="round" opacity="0.4"/>
  <line x1="824" y1="620" x2="864" y2="640" stroke="#f0efe8" stroke-width="14" stroke-linecap="round" opacity="0.4"/>

  <!-- Needle -->
  <line x1="512" y1="620" x2="700" y2="320" stroke="#E07A3A" stroke-width="22" stroke-linecap="round"/>

  <!-- Center hub -->
  <circle cx="512" cy="620" r="60" fill="#0a0a0c" stroke="#E07A3A" stroke-width="14"/>
  <circle cx="512" cy="620" r="22" fill="#E07A3A"/>
</svg>
