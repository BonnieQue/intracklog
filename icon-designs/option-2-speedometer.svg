      <stop offset="0" stop-color="#0a0a0c"/>
      <stop offset="1" stop-color="#1a1a22"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="220" fill="url(#bg2)"/>

  <!-- Outer arc (gauge background) -->
